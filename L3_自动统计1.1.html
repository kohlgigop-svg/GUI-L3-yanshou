<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>表格字段非空值统计工具</title>
  <!-- SheetJS: 解析 xlsx -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- html2canvas: 截图 -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --primary: #4f6ef7;
      --primary-light: #eef0ff;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --purple: #a855f7;
      --bg: #f5f7ff;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 20px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--primary);
      margin-top: 16px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 32px;
    }

    /* ---- 拖拽区域 ---- */
    #drop-zone {
      border: 2.5px dashed var(--primary);
      border-radius: var(--radius);
      background: var(--primary-light);
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      max-width: 640px;
      margin: 0 auto 32px;
      position: relative;
    }
    #drop-zone.drag-over {
      background: #d6dbff;
      border-color: #2d44c8;
    }
    #drop-zone svg { margin-bottom: 12px; }
    #drop-zone p { color: var(--muted); font-size: 0.95rem; margin-top: 6px; }
    #drop-zone strong { color: var(--primary); }
    #file-input { display: none; }
    #file-name {
      margin-top: 14px;
      font-size: 0.88rem;
      color: var(--primary);
      font-weight: 600;
    }

    /* ---- Sheet选择 ---- */
    #sheet-selector {
      display: none;
      max-width: 640px;
      margin: 0 auto 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }
    #sheet-selector label {
      font-weight: 600;
      margin-bottom: 10px;
      display: block;
      color: var(--text);
    }
    #sheet-selector select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--bg);
      cursor: pointer;
    }
    #sheet-selector button {
      margin-top: 14px;
      width: 100%;
      padding: 11px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #sheet-selector button:hover { background: #3d5ce0; }

    /* ---- 结果区 ---- */
    #result-area { display: none; max-width: 780px; margin: 0 auto; }

    /* 操作按钮 */
    .action-bar {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { opacity: 0.85; }
    .btn-copy { background: var(--primary); color: #fff; }
    .btn-reset { background: #e2e8f0; color: var(--text); }

    /* 统计卡片容器（截图目标） */
    #snapshot-target {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 28px 28px 24px;
      box-shadow: 0 2px 12px rgba(79,110,247,0.07);
    }

    .report-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }
    .report-meta {
      font-size: 0.84rem;
      color: var(--muted);
      margin-bottom: 22px;
    }

    /* 汇总数字 */
    .summary-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .summary-card {
      flex: 1;
      min-width: 130px;
      background: var(--primary-light);
      border-radius: 10px;
      padding: 16px 20px;
      text-align: center;
    }
    .summary-card .s-num { font-size: 2rem; font-weight: 800; color: var(--primary); }
    .summary-card .s-label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    /* 数据表格 */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.93rem;
    }
    .stats-table th {
      background: #f1f5f9;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 2px solid var(--border);
    }
    .stats-table td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .stats-table tr:last-child td { border-bottom: none; }
    .stats-table tr:hover td { background: #f8faff; }

    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .tag-success  { background: #dcfce7; color: #15803d; }
    .tag-model    { background: #fef3c7; color: #92400e; }
    .tag-env      { background: #fee2e2; color: #b91c1c; }
    .tag-screen   { background: #ede9fe; color: #6d28d9; }
    .tag-task     { background: #dbeafe; color: #1d4ed8; }

    /* 进度条 */
    .bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .bar-bg {
      flex: 1;
      height: 8px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s ease;
    }
    .bar-pct {
      font-weight: 700;
      font-size: 0.88rem;
      min-width: 48px;
      text-align: right;
      color: var(--text);
    }

    /* 复制成功提示 */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1e293b;
      color: #fff;
      padding: 12px 28px;
      border-radius: 99px;
      font-size: 0.92rem;
      font-weight: 600;
      transition: transform 0.3s, opacity 0.3s;
      opacity: 0;
      z-index: 999;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

<!-- 返回主页导航 -->
<div style="max-width: 640px; margin: 0 auto -10px auto; padding-top: 10px;">
  <a href="index.html" style="display: inline-flex; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; font-size: 0.95rem; font-weight: 500; padding: 6px 12px; border-radius: 8px; background: #f8fafc; border: 1px solid var(--border); transition: all 0.2s;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    返回工具箱主页
  </a>
</div>

<h1>📊 表格字段非空值统计工具</h1>
<p class="subtitle">拖拽文件，一键统计特定列的非空数据行数及占比</p>

<!-- 拖拽区 -->
<div id="drop-zone" onclick="document.getElementById('file-input').click()">
  <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
    <rect width="48" height="48" rx="12" fill="#e0e7ff"/>
    <path d="M24 14v14M17 21l7-7 7 7" stroke="#4f6ef7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M14 34h20" stroke="#4f6ef7" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <p><strong>点击选择</strong>或将 .xlsx 文件拖入此区域</p>
  <div id="file-name"></div>
  <input type="file" id="file-input" accept=".xlsx,.xls,.csv" />
</div>

<!-- Sheet选择 -->
<div id="sheet-selector">
  <label for="sheet-select">检测到多个 Sheet，请选择要统计的 Sheet：</label>
  <select id="sheet-select"></select>
  <button onclick="runStats()">一键统计指定字段</button>
</div>

<!-- 结果区 -->
<div id="result-area">
  <div class="action-bar">
    <button class="btn btn-reset" onclick="resetAll()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>
      重新上传
    </button>
    <button class="btn btn-copy" onclick="copyScreenshot()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      复制统计截图
    </button>
  </div>

  <div id="snapshot-target">
    <div class="report-title" id="report-title">字段非空率统计报告</div>
    <div class="report-meta" id="report-meta"></div>

    <div class="summary-row" id="summary-row"></div>

    <table class="stats-table">
      <thead>
        <tr>
          <th>统计字段（列名）</th>
          <th style="text-align:center">非空行数</th>
          <th style="min-width:180px">占比（进度条）</th>
          <th style="text-align:right">非空占比（%）</th>
        </tr>
      </thead>
      <tbody id="stats-body"></tbody>
    </table>
    
    <div id="missing-cols-notice" style="margin-top:16px; color:#ef4444; font-size:0.9rem; font-weight:600; display:none;">
      ⚠️ 以下预定义字段在表格中未找到对应列：<span id="missing-cols-list"></span>
    </div>
  </div>
</div>

<div id="toast">✅ 截图已复制到剪贴板</div>

<script>
// ---- 需要统计的目标列名（忽略大小写和空格进行匹配） ----
const TARGET_COLUMNS = [
  { key: 'task 完成情况:任务成功', tagClass: 'tag-success', barColor: '#22c55e' },
  { key: 'task 完成情况:模型问题', tagClass: 'tag-model',   barColor: '#f59e0b' },
  { key: 'task 完成情况:工程环境问题', tagClass: 'tag-env',     barColor: '#ef4444' },
  { key: 'task 完成情况:执行中连续黑屏超10屏', tagClass: 'tag-screen',  barColor: '#a855f7' },
  { key: 'task 完成情况:task问题', tagClass: 'tag-task',    barColor: '#3b82f6' }
];

// 标准化字符串，用于列名匹配
function normalize(s) {
  return String(s || '').replace(/[\s\u3000:：\-]/g, '').toLowerCase();
}

let workbook = null;

// ---- 拖拽 & 文件读取 ----
const dropZone = document.getElementById('drop-zone');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

function loadFile(file) {
  document.getElementById('file-name').textContent = '📎 ' + file.name;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      workbook = XLSX.read(e.target.result, { type: 'array' });
      populateSheetSelect();
    } catch(err) {
      alert('文件解析失败，请确认是有效的 .xlsx 文件。\n' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function populateSheetSelect() {
  const sel = document.getElementById('sheet-select');
  sel.innerHTML = '';
  workbook.SheetNames.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
  
  document.getElementById('sheet-selector').style.display = 'block';
  document.getElementById('result-area').style.display = 'none';
  
  // 如果只有一个Sheet，直接开始统计，节省用户点击步骤
  if(workbook.SheetNames.length === 1) {
    runStats();
  }
}

// ---- 核心统计逻辑 ----
function runStats() {
  const sheetName = document.getElementById('sheet-select').value;
  const sheet = workbook.Sheets[sheetName];
  // 将表格转换为二维数组，保留空字符串
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

  if (rows.length < 2) { 
    alert('该 Sheet 数据不足（没有数据行），请检查。'); 
    return; 
  }

  const headers = rows[0];
  const dataRows = rows.slice(1);
  const totalDataRows = dataRows.length; // 分母：数据总行数

  // 1. 查找目标列的索引
  const colMapping = {}; // targetKey -> columnIndex
  const missingCols = [];
  
  TARGET_COLUMNS.forEach(target => {
    const normTarget = normalize(target.key);
    // 修复：h 可能为 undefined/null，因此需要传入空字符串进行保护
    const colIndex = headers.findIndex(h => {
      const normH = normalize(h || '');
      return normH.includes(normTarget) || normTarget.includes(normH);
    });
    
    if (colIndex !== -1) {
      colMapping[target.key] = colIndex;
    } else {
      missingCols.push(target.key);
    }
  });

  // 2. 统计每列的非空数量
  let totalNonEmptyCount = 0; // 新增：记录所有目标列的非空行数总和
  
  const results = TARGET_COLUMNS.map(target => {
    const colIndex = colMapping[target.key];
    if (colIndex === undefined) return { ...target, count: 0, found: false };
    
    let nonEmptyCount = 0;
    dataRows.forEach(row => {
      const val = String(row[colIndex] || '').trim();
      // 判断为"非空"的逻辑：内容不为空字符串
      if (val !== '') {
        nonEmptyCount++;
      }
    });
    
    totalNonEmptyCount += nonEmptyCount; // 累加到总和中
    
    return { ...target, count: nonEmptyCount, found: true };
  });

  renderResult({ results, totalNonEmptyCount, totalDataRows, missingCols, sheetName });
}

function renderResult({ results, totalNonEmptyCount, totalDataRows, missingCols, sheetName }) {
  const now = new Date().toLocaleString('zh-CN', { hour12: false });
  document.getElementById('report-meta').textContent =
    `数据源 Sheet：${sheetName}  |  统计时间：${now}`;

  // 汇总行
  const summaryRow = document.getElementById('summary-row');
  summaryRow.innerHTML = `
    <div class="summary-card">
      <div class="s-num">${totalDataRows}</div>
      <div class="s-label">表格数据总行数</div>
    </div>
    <div class="summary-card">
      <div class="s-num" style="color:var(--primary)">${totalNonEmptyCount}</div>
      <div class="s-label">目标字段非空总和 (分母)</div>
    </div>
  `;

  // 明细表格
  const tbody = document.getElementById('stats-body');
  tbody.innerHTML = '';
  
  results.forEach(res => {
    // 现在的分母是这5列的非空值总和 (totalNonEmptyCount)
    const pct = totalNonEmptyCount > 0 ? (res.count / totalNonEmptyCount * 100) : 0;
    const barColor = res.found ? res.barColor : '#cbd5e1';
    const displayCount = res.found ? res.count : '-';
    const displayPct = res.found ? `${pct.toFixed(2)}%` : '-';
    
    const row = document.createElement('tr');
    if (!res.found) row.style.opacity = '0.6';
    
    row.innerHTML = `
      <td><span class="tag ${res.tagClass}">${res.key}</span></td>
      <td style="text-align:center;font-weight:700;font-size:1.1rem">${displayCount}</td>
      <td>
        <div class="bar-wrap">
          <div class="bar-bg">
            <div class="bar-fill" style="width:${res.found ? pct : 0}%;background:${barColor}"></div>
          </div>
        </div>
      </td>
      <td class="bar-pct" style="text-align:right">${displayPct}</td>
    `;
    tbody.appendChild(row);
  });

  // 缺失列提示
  const noticeEl = document.getElementById('missing-cols-notice');
  if (missingCols.length > 0) {
    document.getElementById('missing-cols-list').textContent = missingCols.join('，');
    noticeEl.style.display = 'block';
  } else {
    noticeEl.style.display = 'none';
  }

  document.getElementById('result-area').style.display = 'block';
  document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ---- 截图复制 ----
async function copyScreenshot() {
  const target = document.getElementById('snapshot-target');
  try {
    const canvas = await html2canvas(target, {
      scale: 2,
      backgroundColor: '#ffffff',
      useCORS: true,
      logging: false
    });
    canvas.toBlob(async blob => {
      try {
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob })
        ]);
        showToast('✅ 截图已复制到剪贴板，可直接粘贴');
      } catch (err) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '字段非空统计报告.png';
        a.click();
        URL.revokeObjectURL(url);
        showToast('📥 剪贴板写入受限，已自动下载截图');
      }
    }, 'image/png');
  } catch (err) {
    alert('截图失败：' + err.message);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ---- 重置 ----
function resetAll() {
  workbook = null;
  document.getElementById('file-name').textContent = '';
  document.getElementById('file-input').value = '';
  document.getElementById('sheet-selector').style.display = 'none';
  document.getElementById('result-area').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
