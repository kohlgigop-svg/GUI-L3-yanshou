<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>队列验收工具箱</title>
  <style>
    :root {
      --primary: #4f6ef7;
      --bg: #f5f7ff;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* 头部 */
    header {
      text-align: center;
      margin-bottom: 48px;
    }
    header h1 {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    header p {
      color: var(--muted);
      font-size: 1.05rem;
    }

    /* 工具网格 */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    /* 工具卡片 */
    .tool-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .tool-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(79, 110, 247, 0.1);
      border-color: var(--primary);
    }

    .tool-icon {
      width: 48px;
      height: 48px;
      background: #eef0ff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 16px;
      color: var(--primary);
    }

    .tool-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .tool-desc {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
      flex-grow: 1;
      margin-bottom: 20px;
    }

    .tool-footer {
      display: flex;
      align-items: center;
      color: var(--primary);
      font-weight: 500;
      font-size: 0.9rem;
      gap: 6px;
    }
    .tool-footer svg {
      transition: transform 0.2s;
    }
    .tool-card:hover .tool-footer svg {
      transform: translateX(4px);
    }

    /* 敬请期待卡片 */
    .tool-card.coming-soon {
      background: transparent;
      border: 2px dashed #cbd5e1;
      justify-content: center;
      align-items: center;
      text-align: center;
      cursor: default;
    }
    .tool-card.coming-soon:hover {
      transform: none;
      box-shadow: none;
      border-color: #94a3b8;
    }
    .tool-card.coming-soon .tool-title {
      color: var(--muted);
    }
    .tool-card.coming-soon .tool-icon {
      background: #f1f5f9;
      color: #94a3b8;
    }

  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
      队列验收工具箱
    </h1>
    <p>队列验收效率小工具集合，纯前端运行，数据安全私密</p>
  </header>

  <div class="tools-grid">
    <!-- 工具 1：Task 统计 -->
    <a href="L3_自动统计.html" class="tool-card">
      <div class="tool-icon">📊</div>
      <div class="tool-title">Task 完成情况统计</div>
      <div class="tool-desc">一键导入 .xlsx 文件，自动统计模型问题、工程环境问题等任务的出现次数与占比，支持一键生成并复制图表报告。</div>
      <div class="tool-footer">
        打开工具
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </div>
    </a>

    <!-- 工具 2：Task 筛查 -->
    <a href="L3_自动筛查.html" class="tool-card">
      <div class="tool-icon">📊</div>
      <div class="tool-title">Task 异常数据筛查</div>
      <div class="tool-desc">一键导入 .xlsx 文件，自动筛查违反规则的低级问题，并给出对应的异常数据task id</div>
      <div class="tool-footer">
        打开工具
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </div>
    </a>

    <!-- 占位工具：可以根据您的需求后续添加 -->
    <div class="tool-card coming-soon">
      <div class="tool-icon">➕</div>
      <div class="tool-title">更多工具添加中...</div>
    </div>
  </div>
</div>

</body>
</html>
