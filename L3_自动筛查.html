<!DOCTYPE html>
<html lang="zh-CN">
<head>

      border: 2px dashed #4a90d9;
      border-radius: 16px;

      text-align: center;
      padding: 52px 20px;
      cursor: pointer;
      transition: border-color .2s, background .2s;

    #dropzone.drag-over { border-color: #1a73e8; background: #e8f0fe; }
    #dropzone svg { width: 56px; height: 56px; color: #4a90d9; }

    #dropzone .dz-sub   { font-size: 13px; color: #718096; margin-top: 6px; }
    #dropzone .dz-btn {
      display: inline-block;
      margin-top: 18px;
      padding: 9px 28px;
      background: #4a90d9;
      color: #fff;
      border-radius: 8px;
      font-size: 14px;

    }
    #dropzone .dz-btn:hover { background: #2c70c4; }

<script>
// ════════════════════════════════════════════════════
//   工具函数
// ════════════════════════════════════════════════════
// 空值判断
// 为了防止将 '-'、'/'、'null'、'NA' 等占位符误判为有值，增强基础的空值过滤。
// strictChinese: 如果为 true，则必须包含中文字符才算非空。如果为 false，只过滤纯占位符。
function isBlank(v, strictChinese = false) {
  if (v === null || v === undefined) return true;
  const s = String(v).trim().toLowerCase();
  
  // 过滤掉完全无意义的空和纯占位符
  if (s === '' || s === 'nan' || s === 'null' || s === 'undefined' || s === 'na' || s === '-' || s === '/' || s === '\\' || s === '无') {
    return true;
  }
  
  if (strictChinese) {
    // 含有至少一个中文字符才算非空
    return !/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff\u{20000}-\u{2a6df}\u{2a700}-\u{2b73f}\u{2b740}-\u{2b81f}\u{2b820}-\u{2ceaf}]/u.test(s);
  }
  
  return false;
}
function notBlank(v, strictChinese = false) { return !isBlank(v, strictChinese); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg || '已复制到剪贴板';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast());
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast();
  }
}

// ════════════════════════════════════════════════════
//   拼音检测
// ════════════════════════════════════════════════════

// 完整拼音音节列表（含声调标注前的原始音节）
const PINYIN_SYLLABLES = new Set([
  // a
  "a","ai","an","ang","ao",
  // b
  "ba","bai","ban","bang","bao","bei","ben","beng","bi","bian","biao","bie","bin","bing","bo","bu",
  // c
  "ca","cai","can","cang","cao","ce","cen","ceng","cha","chai","chan","chang","chao","che","chen","cheng","chi","chong","chou","chu","chua","chuai","chuan","chuang","chui","chun","chuo","ci","cong","cou","cu","cuan","cui","cun","cuo",
  // d
  "da","dai","dan","dang","dao","de","den","deng","di","dia","dian","diao","die","ding","diu","dong","dou","du","duan","dui","dun","duo",
  // e
  "e","ei","en","eng","er",
  // f
  "fa","fan","fang","fei","fen","feng","fo","fou","fu",
  // g
  "ga","gai","gan","gang","gao","ge","gei","gen","geng","gong","gou","gu","gua","guai","guan","guang","gui","gun","guo",
  // h
  "ha","hai","han","hang","hao","he","hei","hen","heng","hong","hou","hu","hua","huai","huan","huang","hui","hun","huo",
  // j
  "ji","jia","jian","jiang","jiao","jie","jin","jing","jiong","jiu","ju","juan","jue","jun",
  // k
  "ka","kai","kan","kang","kao","ke","kei","ken","keng","kong","kou","ku","kua","kuai","kuan","kuang","kui","kun","kuo",
  // l
  "la","lai","lan","lang","lao","le","lei","leng","li","lia","lian","liang","liao","lie","lin","ling","liu","lo","long","lou","lu","luan","lue","lun","luo","lv","lve",
  // m
  "ma","mai","man","mang","mao","me","mei","men","meng","mi","mian","miao","mie","min","ming","miu","mo","mou","mu",
  // n
  "na","nai","nan","nang","nao","ne","nei","nen","neng","ni","nian","niang","niao","nie","nin","ning","niu","nong","nou","nu","nuan","nue","nun","nuo","nv","nve",
  // o
  "o","ou",
  // p
  "pa","pai","pan","pang","pao","pei","pen","peng","pi","pian","piao","pie","pin","ping","po","pou","pu",
  // q
  "qi","qia","qian","qiang","qiao","qie","qin","qing","qiong","qiu","qu","quan","que","qun",
  // r
  "ran","rang","rao","re","ren","reng","ri","rong","rou","ru","rua","ruan","rui","run","ruo",
  // s
  "sa","sai","san","sang","sao","se","sen","seng","sha","shai","shan","shang","shao","she","shei","shen","sheng","shi","shou","shu","shua","shuai","shuan","shuang","shui","shun","shuo","si","song","sou","su","suan","sui","sun","suo",
  // t
  "ta","tai","tan","tang","tao","te","teng","ti","tian","tiao","tie","ting","tong","tou","tu","tuan","tui","tun","tuo",
  // w
  "wa","wai","wan","wang","wei","wen","weng","wo","wu",
  // x
  "xi","xia","xian","xiang","xiao","xie","xin","xing","xiong","xiu","xu","xuan","xue","xun",
  // y
  "ya","yai","yan","yang","yao","ye","yi","yin","ying","yo","yong","you","yu","yuan","yue","yun",
  // z
  "za","zai","zan","zang","zao","ze","zei","zen","zeng","zha","zhai","zhan","zhang","zhao","zhe","zhei","zhen","zheng","zhi","zhong","zhou","zhu","zhua","zhuai","zhuan","zhuang","zhui","zhun","zhuo","zi","zong","zou","zu","zuan","zui","zun","zuo"
]);

// 常见英文单词白名单（覆盖常见技术词、连接词、常见词等）
const ENGLISH_WORDS = new Set(`
a about above across after again age ago agree all almost along already also although always am an and another any anyone anything are around as at away
back be because been before being below between both but by
call came can come could
day did do done down during
each else even ever every
few first for found from
get go going good got great
had has have he her here him his how
i if in into is it its
just
know
large last later least less let like likely look
made make many may me might more most much must my
need never new next no not now
of off on one only open or other our out over
part people per put
rather really right
same see she should since small so some something still such
take than that the their then there these they this those through to too
under until up upon us use
very
want was we what when where which while who will with would
year you your
a an the
add all any app are as at
back be been best but by
call can case check click code col comment complete config
data debug default delete doc done drop
each else end equal error event
false field file final find first fix for found from function
get given group guide has have
here how id if in input it
json key length let like list load log
main map max message min model name
need new no none not null
ok on open or page param path print
read render reset result return run
save set skip some sort start state step string
table task test text then this to true type
update use user
valid value
when while with
`.trim().split(/\s+/).filter(Boolean));

// 判断字符串是否可以被拼音音节完整覆盖（动态规划）
function canBeParsedAsPinyin(str) {
  const s = str.toLowerCase();
  const n = s.length;
  if (n === 0) return false;
  // dp[i] = true 表示 s[0..i-1] 可以被拼音音节完整拆解
  const dp = new Array(n + 1).fill(false);
  dp[0] = true;
  for (let i = 1; i <= n; i++) {
    // 最长拼音音节不超过 6 个字符
    for (let len = 1; len <= Math.min(6, i); len++) {
      if (dp[i - len] && PINYIN_SYLLABLES.has(s.slice(i - len, i))) {
        dp[i] = true;
        break;
      }
    }
  }
  return dp[n];
}

// 从文本中检测是否含有拼音（返回找到的拼音词列表，空则无）
function detectPinyin(text) {
  if (isBlank(text, false)) return [];
  const found = [];
  // 按非字母字符分割（保留纯字母 token）
  const tokens = String(text).split(/[^a-zA-ZüÜ]+/).filter(t => t.length >= 2);
  for (const token of tokens) {
    const lower = token.toLowerCase();
    // 在英文白名单中则跳过
    if (ENGLISH_WORDS.has(lower)) continue;
    // 纯英文且长度大于 6，大概率是英文词，保守处理：跳过
    // （拼音音节组合通常 ≤ 2 个音节，即 ≤ 12 字符，但英文长词也可能被误判，故保守）
    // 策略：能被拼音覆盖 AND 不像英文（无连续辅音簇）
    if (canBeParsedAsPinyin(lower) && !looksLikeEnglish(lower)) {
      found.push(token);
    }
  }
  return found;
}

// 判断是否"像英文"（启发式：含有英文中常见但拼音中没有的辅音簇）
function looksLikeEnglish(s) {
  // 英文中常见但不属于拼音的辅音组合
  const engPatterns = /(?:ck|tch|tion|ght|wr|kn|mb|[bcdfghjklmnpqrstvwxyz]{3,}|str|spr|scr|spl|thr|phy|psy|[^aeiouüaeiou]{3})/i;
  if (engPatterns.test(s)) return true;
  // 含有字母 v/f 开头且后面接非拼音字符组合
  if (/^[vf]/.test(s) && !PINYIN_SYLLABLES.has(s.toLowerCase())) return true;
  return false;
}

// ════════════════════════════════════════════════════
//   核心检测逻辑
// ════════════════════════════════════════════════════
function runChecks(rows) {
  // rows: 数组，每个元素是表头名→值 的对象
  // 我们按列索引取值，先找列名

  if (!rows || rows.length === 0) return null;

  // 使用固定的列名映射，防止表头顺序乱掉或部分列首行缺失导致错位
  const HEADERS = [
    "时间", "项目ID", "任务id", "任务名称", "case链接", "标注人", "质检人", "是否跳过",
    "task-页数",
    "task 完成情况:任务成功", "task 完成情况:模型问题", "task 完成情况:工程环境问题",
    "task 完成情况:执行中连续黑屏超10屏", "task 完成情况:task问题",
    "客观因素限制修改的task", "action_text", "reasoning", "cot", "action_return",
    "step 正确性判断:正确", "step 正确性判断:不正确",
    "step 正确性判断:错误页面引导点击返回了", "step 正确性判断:此页之后step均错误",
    "错误的step的原因"
  ];

  function col(row, idx) {
    const key = HEADERS[idx];
    return row[key];
  }

  // 按任务id分组（并进行向下填充处理：如果当前行的任务id为空，则继承上一行的任务id）
  const groups = new Map(); // taskId → [rowObj, ...]
  let currentTaskId = null;
  
  for (const row of rows) {
    let tid = col(row, 2);
    
    // 向下填充逻辑，任务ID不要求中文字符
    if (isBlank(tid, false)) {
      tid = currentTaskId;
    } else {
      currentTaskId = tid; // 更新为新的任务id
    }
    
    const key = isBlank(tid, false) ? '__blank__' : String(tid);
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(row);
  }

  // 每条规则用 Map<taskId, Set<页数>> 记录，方便展示违规页
  function addViolation(map, tid, pageVal) {
    if (!map.has(tid)) map.set(tid, new Set());
    const rawStr = (pageVal === null || pageVal === undefined) ? '' : String(pageVal).trim();
    const pNum = Number(rawStr);
    if (!isNaN(pNum) && pNum > 0) map.get(tid).add(pNum);
  }
  const r1 = new Map();
  const r2 = new Map();
  const r3 = new Map();
  const r4 = new Map();
  const r5 = new Map();
  const r6 = new Map();

  // ── 规则1 ──
  // 相同任务id下，列9-13若不为空，只能出现在 task-页数（列8）最大的行
  for (const [tid, taskRows] of groups) {
    let maxPage = -Infinity;
    for (const row of taskRows) {
      const p = parseFloat(col(row, 8));
      if (!isNaN(p) && p > maxPage) maxPage = p;
    }
    for (const row of taskRows) {
      const p = parseFloat(col(row, 8));
      const isMaxPage = !isNaN(p) && p === maxPage;
      const hasCompletion = [9,10,11,12,13].some(i => notBlank(col(row, i)));
      if (hasCompletion && !isMaxPage) {
        addViolation(r1, tid, col(row, 8));
      }
    }
  }

  // ── 规则2 ──
  for (const [tid, taskRows] of groups) {
    for (const row of taskRows) {
      const c19 = col(row, 19), c20 = col(row, 20);
      const c21 = col(row, 21), c22 = col(row, 22);
      const c23 = col(row, 23);
      const isC19_NotBlank = notBlank(c19, false);
      const isC20_NotBlank = notBlank(c20, false);
      const isC21_NotBlank = notBlank(c21, false);
      const isC22_NotBlank = notBlank(c22, false);
      const isC23_NotBlank = notBlank(c23, true);
      const isC23_Blank = isBlank(c23, true);
      const isAll_19_22_Blank = isBlank(c19, false) && isBlank(c20, false) && isBlank(c21, false) && isBlank(c22, false);
      const page = col(row, 8);
      if (isC19_NotBlank && isC23_NotBlank) { addViolation(r2, tid, page); continue; }
      if (isC21_NotBlank && isC23_NotBlank) { addViolation(r2, tid, page); continue; }
      if (isC20_NotBlank && isC23_Blank)    { addViolation(r2, tid, page); continue; }
      if (isC22_NotBlank && isC23_Blank)    { addViolation(r2, tid, page); continue; }
      if (isAll_19_22_Blank && isC23_NotBlank) { addViolation(r2, tid, page); continue; }
    }
  }

  // ── 规则3 ──
  for (const [tid, taskRows] of groups) {
    for (let i = 0; i < taskRows.length; i++) {
      const row = taskRows[i];
      if (isBlank(col(row, 22))) continue;
      for (let j = 0; j < i; j++) {
        const r = taskRows[j];
        const allBlank = [19,20,21,22].every(k => isBlank(col(r, k)));
        if (allBlank) { addViolation(r3, tid, col(r, 8)); }
      }
      for (let j = i + 1; j < taskRows.length; j++) {
        const r = taskRows[j];
        const anySet = [19,20,21].some(k => notBlank(col(r, k)));
        if (anySet) { addViolation(r3, tid, col(r, 8)); }
      }
    }
  }

  // ── 规则4 ──
  for (const [tid, taskRows] of groups) {
    const allCol22Blank = taskRows.every(row => isBlank(col(row, 22)));
    if (!allCol22Blank) continue;
    for (const row of taskRows) {
      const allBlank = [19,20,21].every(k => isBlank(col(row, k)));
      if (allBlank) { addViolation(r4, tid, col(row, 8)); }
    }
  }

  // ── 规则5 ──
  for (const [tid, taskRows] of groups) {
    for (const row of taskRows) {
      if (notBlank(col(row, 9)) && isBlank(col(row, 19))) {
        addViolation(r5, tid, col(row, 8));
      }
    }
  }

  // ── 规则6 ──
  for (const [tid, taskRows] of groups) {
    for (const row of taskRows) {
      const v = col(row, 23);
      if (notBlank(v, false) && detectPinyin(String(v)).length > 0) {
        addViolation(r6, tid, col(row, 8));
      }
    }
  }

  // ── 规则7 ──
  const r7 = new Map();
  for (const [tid, taskRows] of groups) {
    const pages = [];
    let badPage = null;
    let violated = false;
    for (const row of taskRows) {
      const rawP = col(row, 8);
      const rawStr = (rawP === null || rawP === undefined) ? '' : String(rawP).trim();
      if (rawStr === '' || rawStr === 'NaN') { violated = true; badPage = rawStr; break; }
      const pNum = Number(rawStr);
      if (isNaN(pNum) || !Number.isInteger(pNum) || pNum <= 0) { violated = true; badPage = rawStr; break; }
      pages.push(pNum);
    }
    if (!violated) {
      // 检查重复
      const seen = new Set();
      for (const p of pages) {
        if (seen.has(p)) { addViolation(r7, tid, p); violated = true; }
        seen.add(p);
      }
    }
    if (!violated) {
      // 检查连续性
      const sorted = [...pages].sort((a, b) => a - b);
      for (let i = 0; i < sorted.length; i++) {
        if (sorted[i] !== i + 1) { addViolation(r7, tid, sorted[i]); violated = true; }
      }
    }
    if (violated && !r7.has(tid)) {
      // 空页或格式错误，记录整个任务但无法定位到具体页
      r7.set(tid, new Set());
    }
  }

  // 汇总去重
  const allTids = new Set([...r1.keys(),...r2.keys(),...r3.keys(),...r4.keys(),...r5.keys(),...r6.keys(),...r7.keys()]);
  allTids.delete('__blank__');
  r1.delete('__blank__'); r2.delete('__blank__');
  r3.delete('__blank__'); r4.delete('__blank__');
  r5.delete('__blank__'); r6.delete('__blank__');
  r7.delete('__blank__');

  return { r1, r2, r3, r4, r5, r6, r7, all: allTids };
}

let ignoredRules = new Set();
let currentRes = null;

// ════════════════════════════════════════════════════
//   渲染结果
// ════════════════════════════════════════════════════
function renderResults() {
  if (!currentRes) return;
  const res = currentRes;
  const container = document.getElementById('results');
  container.innerHTML = '';

  const { r1, r2, r3, r4, r5, r6, r7 } = res;
  const ruleList = [r1, r2, r3, r4, r5, r6, r7];
  
  // 重新计算未被忽略的 allTids
  const activeAllTids = new Set();
  ruleList.forEach((r, i) => {
    if (!ignoredRules.has(i + 1)) {
      for (const id of r.keys()) {
        activeAllTids.add(id);
      }
    }
  });
  
  const allArr = [...activeAllTids].sort((a, b) => parseFloat(a) - parseFloat(b) || a.localeCompare(b));

  // 汇总卡片
  const sumCard = document.createElement('div');
  sumCard.className = 'summary-card';

  const h2 = document.createElement('h2');
  h2.innerHTML = `汇总：所有违规任务 ID <span class="badge">${allArr.length}</span>`;
  sumCard.appendChild(h2);

  if (allArr.length === 0) {
    const ok = document.createElement('div');
    ok.className = 'no-issue';
    ok.textContent = '🎉 未发现任何违规任务 ID（或所有违规已被忽略）！';
    sumCard.appendChild(ok);
  } else {
    const copyAllBtn = document.createElement('button');
    copyAllBtn.className = 'copy-all-btn';
    copyAllBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> 复制全部（${allArr.length} 个）`;
    copyAllBtn.onclick = () => copyText(allArr.join(','));
    sumCard.appendChild(copyAllBtn);

    const grid = document.createElement('div');
    grid.className = 'id-grid';
    for (const id of allArr) {
      // 汇总该id违反了哪些规则，以及所有涉及的错误页数（跨未忽略规则合并去重）
      const hitRules = [];
      const allPages = new Set();
      ruleList.forEach((r, i) => {
        if (!ignoredRules.has(i + 1) && r.has(id)) {
          hitRules.push('规则' + (i + 1));
          for (const p of r.get(id)) allPages.add(p);
        }
      });
      const sortedPages = [...allPages].sort((a, b) => a - b);
      const pagesStr = sortedPages.length > 0
        ? '错误页：第 ' + sortedPages.join('、') + ' 页'
        : '错误页：未知';
      const chip = document.createElement('div');
      chip.className = 'id-chip';
      chip.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <span style="font-weight:700;font-size:13px">${id}</span>
          <span class="chip-copy" title="复制此ID">复制</span>
        </div>
        <div style="font-size:11px;color:#e53e3e;margin-top:3px">${pagesStr}</div>
        <div style="font-size:11px;color:#718096;margin-top:1px">${hitRules.join(' / ')}</div>
      `;
      chip.querySelector('.chip-copy').onclick = () => copyText(id);
      grid.appendChild(chip);
    }
    sumCard.appendChild(grid);
  }

  container.appendChild(sumCard);

  // 规则面板列表
  const rules = [
    {
      num: 1, ids: r1,
      title: '规则1：完成情况填写位置错误',
      desc: '相同任务ID下，列9-13（task完成情况）若不为空，只能出现在task-页数最大的行'
    },
    {
      num: 2, ids: r2,
      title: '规则2：原因字段与判断字段不匹配',
      desc: '19不为空，则23为空；21不为空，则23为空；20不为空，则23不为空；22不为空，则23不为空；19-22均为空，则23为空'
    },
    {
      num: 3, ids: r3,
      title: '规则3：「此页之后step均错误」前后数据异常',
      desc: '列22不为空时，其前每一行的19-22不能全为空；其后每一行的19-21必须全为空'
    },
    {
      num: 4, ids: r4,
      title: '规则4：step正确性判断缺失',
      desc: '列22均为空时，该任务ID下每行的列19-21不能同时全为空'
    },
    {
      num: 5, ids: r5,
      title: '规则5：任务成功但step正确性未填',
      desc: '列9（任务成功）不为空时，列19（step正确）不能为空'
    },
    {
      num: 6, ids: r6,
      title: '规则6：原因字段含有拼音',
      desc: '列23（错误的step的原因）中不能出现拼音文字'
    },
    {
      num: 7, ids: r7,
      title: '规则7：task-页数缺失、不连续或重复',
      desc: '列8（task-页数）不能为空，且同一任务ID下的页数值必须是从1到n的连续整数，不允许重复、不允许跳号'
    }
  ];

  for (const rule of rules) {
    const panel = document.createElement('div');
    panel.className = 'rule-panel';
    const isIgnored = ignoredRules.has(rule.num);
    if (isIgnored) panel.style.opacity = '0.6';

    const idsArr = [...rule.ids.keys()].sort((a, b) => parseFloat(a) - parseFloat(b) || a.localeCompare(b));
    const isZero = idsArr.length === 0;

    const hdr = document.createElement('div');
    hdr.className = 'rule-header';
    hdr.innerHTML = `
      <div class="rule-header-left">
        <div class="rule-num">${rule.num}</div>
        <div>
          <div class="rule-title">${rule.title}</div>
          <div class="rule-desc">${rule.desc}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;">
        <span class="rule-count ${isZero ? 'zero' : ''}">${idsArr.length} 个违规</span>
        <button class="ignore-btn ${isIgnored ? 'active' : ''}">${isIgnored ? '已忽略' : '忽略此规则'}</button>
        <span class="chevron">▾</span>
      </div>
    `;
    
    // 点击面板展开/收起
    hdr.onclick = (e) => {
      if (e.target.tagName === 'BUTTON') return;
      panel.classList.toggle('open');
    };
    
    // 忽略按钮点击逻辑
    const ignoreBtn = hdr.querySelector('.ignore-btn');
    ignoreBtn.onclick = (e) => {
      e.stopPropagation();
      if (ignoredRules.has(rule.num)) {
        ignoredRules.delete(rule.num);
      } else {
        ignoredRules.add(rule.num);
      }
      renderResults(); // 触发重渲染
    };
    
    panel.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'rule-body';

    if (isZero) {
      body.innerHTML = '<div class="no-issue">✓ 该规则下无违规任务 ID</div>';
    } else {
      const tagBox = document.createElement('div');
      tagBox.className = 'rule-ids';
      for (const id of idsArr) {
        const pages = rule.ids.get(id);
        const pagesArr = [...pages].sort((a, b) => a - b);
        const pageStr = pagesArr.length > 0 ? `第 ${pagesArr.join('、')} 页` : '页数未知';
        const tag = document.createElement('div');
        tag.className = 'rule-id-tag';
        tag.innerHTML = `<span class="tag-id">${id}</span><span class="tag-pages">${pageStr}</span>`;
        tagBox.appendChild(tag);
      }
      body.appendChild(tagBox);
    }

    panel.appendChild(body);
    container.appendChild(panel);

    // 有违规的默认展开（如果没被忽略）
    if (!isZero && !isIgnored) panel.classList.add('open');
  }
}

// ════════════════════════════════════════════════════
//   文件处理
// ════════════════════════════════════════════════════
function processFile(file) {
  const statusBar = document.getElementById('status-bar');
  const statusText = document.getElementById('status-text');
  const spinner = document.getElementById('spinner');
  const results = document.getElementById('results');

  statusBar.style.display = 'flex';
  spinner.style.display = 'block';
  statusText.textContent = '正在解析文件…';
  results.innerHTML = '';

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      statusText.textContent = '正在检测数据…';
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array', cellText: true, cellDates: false });
      const ws = wb.Sheets[wb.SheetNames[0]];
      // 转为对象数组（第一行为表头）
      const rows = XLSX.utils.sheet_to_json(ws, {
        defval: null,
        raw: false  // 全部转字符串，保留原始文本
      });

      if (!rows || rows.length === 0) {
        statusText.textContent = '文件为空或格式有误';
        spinner.style.display = 'none';
        return;
      }

      const res = runChecks(rows);
      currentRes = res;
      spinner.style.display = 'none';
      statusText.textContent = `解析完成：共 ${rows.length} 行数据`;
      renderResults();
    } catch(err) {
      spinner.style.display = 'none';
      statusText.textContent = '解析失败：' + err.message;
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ════════════════════════════════════════════════════
//   拖拽 & 点击上传
// ════════════════════════════════════════════════════
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');

dropzone.addEventListener('dragover', e => {
  e.preventDefault();
  dropzone.classList.add('drag-over');
});
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});

document.getElementById('dz-click-btn').addEventListener('click', e => {
  e.stopPropagation();
  fileInput.click();
});
dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) processFile(fileInput.files[0]);
});
</script>
