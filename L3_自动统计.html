  <style>
    :root {
      --primary: #4f6ef7;
      --primary-light: #eef0ff;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --purple: #a855f7;
      --bg: #f5f7ff;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 20px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--primary);
      margin-top: 16px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 32px;
    }

    /* ---- 拖拽区域 ---- */
    #drop-zone {
      border: 2.5px dashed var(--primary);
      border-radius: var(--radius);
      background: var(--primary-light);
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;

      margin: 0 auto 32px;

    }
    #drop-zone svg { margin-bottom: 12px; }
    #drop-zone p { color: var(--muted); font-size: 0.95rem; margin-top: 6px; }
    #drop-zone strong { color: var(--primary); }
    #file-input { display: none; }
    #file-name {
      margin-top: 14px;
      font-size: 0.88rem;
      color: var(--primary);
      font-weight: 600;
    }

    /* ---- 结果区 ---- */
    #result-area { display: none; max-width: 780px; margin: 0 auto; }

    /* 操作按钮 */
    .action-bar {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { opacity: 0.85; }
    .btn-copy { background: var(--primary); color: #fff; }
    .btn-reset { background: #e2e8f0; color: var(--text); }

    /* 统计卡片容器（截图目标） */
    #snapshot-target {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 28px 28px 24px;
      box-shadow: 0 2px 12px rgba(79,110,247,0.07);
    }

    .report-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }
    .report-meta {
      font-size: 0.84rem;
      color: var(--muted);
      margin-bottom: 22px;
    }

    /* 汇总数字 */
    .summary-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .summary-card {
      flex: 1;
      min-width: 130px;
      background: var(--primary-light);
      border-radius: 10px;
      padding: 16px 20px;
      text-align: center;
    }
    .summary-card .s-num { font-size: 2rem; font-weight: 800; color: var(--primary); }
    .summary-card .s-label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    /* 数据表格 */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.93rem;
    }
    .stats-table th {
      background: #f1f5f9;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 2px solid var(--border);
    }
    .stats-table td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .stats-table tr:last-child td { border-bottom: none; }
    .stats-table tr:hover td { background: #f8faff; }

    .task-tables-container {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }
    .task-table-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 22px 24px;
      box-shadow: 0 2px 12px rgba(79,110,247,0.06);
    }
    .task-table-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .task-table-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .task-table-desc {
      font-size: 0.84rem;
      color: var(--muted);
      margin-top: 6px;
    }
    .task-table-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 0.88rem;
      font-weight: 700;
    }
    .task-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .task-detail-table th:nth-child(2),
    .task-detail-table td:nth-child(2) {
      white-space: nowrap;
    }
    .task-empty {
      padding: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
      background: #f8fafc;
      border-radius: 10px;
      border: 1px dashed var(--border);
    }

    .tag {

      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .tag-success  { background: #dcfce7; color: #15803d; }
    .tag-model    { background: #fef3c7; color: #92400e; }
    .tag-env      { background: #fee2e2; color: #b91c1c; }
    .tag-screen   { background: #ede9fe; color: #6d28d9; }
    .tag-task     { background: #dbeafe; color: #1d4ed8; }

    /* 进度条 */
    .bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .bar-bg {
      flex: 1;
      height: 8px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s ease;
    }
    .bar-pct {
      font-weight: 700;
      font-size: 0.88rem;
      min-width: 48px;
      text-align: right;
      color: var(--text);
    }

    /* 复制成功提示 */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1e293b;
      color: #fff;
      padding: 12px 28px;
      border-radius: 99px;
      font-size: 0.92rem;
      font-weight: 600;
      transition: transform 0.3s, opacity 0.3s;
      opacity: 0;
      z-index: 999;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>

<h1>📊 情况分析报告工具</h1>
<p class="subtitle">拖拽单表文件，一键生成情况分析报告</p>

<!-- 拖拽区 -->
<div id="drop-zone" onclick="document.getElementById('file-input').click()">
  <svg width="48" height="48" viewBox="0 0 48 48" fill="none">

<div id="result-area">
  <div class="action-bar">

      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>

    </button>
    <button class="btn btn-copy" onclick="copyScreenshot()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>

    </button>

  <div id="snapshot-target">
    <div class="report-title" id="report-title">情况分析报告</div>

<div id="toast">✅ 截图已复制到剪贴板</div>

<script>
// ---- 需要统计的目标列名（忽略大小写和空格进行匹配） ----
const TARGET_COLUMNS = [
  { key: 'task 完成情况:任务成功', tagClass: 'tag-success', barColor: '#22c55e' },
  { key: 'task 完成情况:模型问题', tagClass: 'tag-model',   barColor: '#f59e0b' },
  { key: 'task 完成情况:工程环境问题', tagClass: 'tag-env',     barColor: '#ef4444' },
  { key: 'task 完成情况:执行中连续黑屏超10屏', tagClass: 'tag-screen',  barColor: '#a855f7' },
  { key: 'task 完成情况:task问题', tagClass: 'tag-task',    barColor: '#3b82f6' }
];

// 标准化字符串，用于列名匹配
function normalize(s) {
  return String(s || '').replace(/[\s\u3000:：\-]/g, '').toLowerCase();
}

function isSkippedTaskValue(v) {
  return String(v ?? '').trim() === '是';
}

function filterSkippedTaskRows(dataRows, taskIdColIdx, skipColIdx) {
  if (taskIdColIdx === -1 || skipColIdx === -1) return dataRows;

  const skippedTaskIds = new Set();
  let currentTaskId = '';

  dataRows.forEach(row => {
    const rawTaskId = String(row[taskIdColIdx] ?? '').trim();
    if (rawTaskId !== '') currentTaskId = rawTaskId;
    if (currentTaskId && isSkippedTaskValue(row[skipColIdx])) {
      skippedTaskIds.add(currentTaskId);
    }
  });

  if (skippedTaskIds.size === 0) return dataRows;

  const filteredRows = [];
  currentTaskId = '';
  dataRows.forEach(row => {
    const rawTaskId = String(row[taskIdColIdx] ?? '').trim();
    if (rawTaskId !== '') currentTaskId = rawTaskId;
    if (currentTaskId && skippedTaskIds.has(currentTaskId)) return;
    filteredRows.push(row);
  });

  return filteredRows;
}

function getCellText(row, colIdx) {
  if (colIdx === -1 || colIdx === undefined || colIdx === null) return '';
  return String(row[colIdx] ?? '').trim();
}

function isSuccessfulTaskValue(v) {
  const text = String(v ?? '').trim();
  return text === '完全成功' || text === '任务成功';
}

function getTaskCompletionLabel(targetKey, cellVal) {
  if (targetKey === 'task 完成情况:任务成功') return '完全成功';
  return String(cellVal ?? '').trim() || String(targetKey).split(':').pop();
}

function sanitizeFileName(name) {
  return String(name || '未命名')
    .replace(/[\\/:*?"<>|]/g, '_')
    .trim() || '未命名';
}

function downloadTaskTableFile(rows, fileName, sheetName) {
  const aoa = [
    ['task完成情况', '任务id', '任务名称'],
    ...rows.map(item => [item.completion, item.taskId, item.taskName])
  ];
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  XLSX.writeFile(wb, fileName);
}

function buildTaskTables(dataRows, taskIdColIdx, taskNameColIdx, colMapping) {

  if (taskIdColIdx === -1) {
    return { successTasks: [], failedTasks: [] };
  }

  const taskMap = new Map();
  let currentTaskId = '';
  let currentTaskName = '';

  dataRows.forEach(row => {
    const rawTaskId = getCellText(row, taskIdColIdx);
    const rawTaskName = getCellText(row, taskNameColIdx);

    if (rawTaskId) currentTaskId = rawTaskId;
    if (rawTaskName) currentTaskName = rawTaskName;
    if (!currentTaskId) return;

    if (!taskMap.has(currentTaskId)) {
      taskMap.set(currentTaskId, {
        taskId: currentTaskId,
        taskName: currentTaskName || '未填写',
        statuses: []
      });
    }

    const task = taskMap.get(currentTaskId);
    if (currentTaskName) task.taskName = currentTaskName;

    TARGET_COLUMNS.forEach(target => {
      const colIndex = colMapping[target.key];
      if (colIndex === undefined) return;

      const cellVal = getCellText(row, colIndex);
      if (!cellVal) return;

      if (!task.statuses.some(item => item.key === target.key && item.value === cellVal)) {
        task.statuses.push({ key: target.key, value: cellVal });
      }
    });
  });

  const successTasks = [];
  const failedTasks = [];

  taskMap.forEach(task => {
    const statusLabels = task.statuses.map(item => getTaskCompletionLabel(item.key, item.value));
    const hasSuccess = task.statuses.some(item => item.key === 'task 完成情况:任务成功' && isSuccessfulTaskValue(item.value));
    const hasFailure = task.statuses.some(item => item.key !== 'task 完成情况:任务成功');

    const rowData = {
      completion: hasSuccess && !hasFailure ? '完全成功' : (statusLabels.length > 0 ? statusLabels.join('、') : '未填写'),
      taskId: task.taskId,
      taskName: task.taskName || '未填写'
    };

    if (hasSuccess && !hasFailure) {
      successTasks.push(rowData);
    } else {
      failedTasks.push(rowData);
    }
  });

  return { successTasks, failedTasks };
}

let workbook = null;



// ---- 拖拽 & 文件读取 ----
const dropZone = document.getElementById('drop-zone');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

function loadFile(file) {
  document.getElementById('file-name').textContent = '📎 ' + file.name;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      workbook = XLSX.read(e.target.result, { type: 'array' });
      // 去除选sheet功能，直接读取第一个sheet并运行统计
      const firstSheetName = workbook.SheetNames[0];
      runStats(firstSheetName);
    } catch(err) {
      alert('文件解析失败，请确认是有效的 .xlsx 文件。\n' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ---- 核心统计逻辑 ----
function runStats(sheetName) {
  const sheet = workbook.Sheets[sheetName];
  // 将表格转换为二维数组，保留空字符串
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

  if (rows.length < 2) { 
    alert('该 Sheet 数据不足（没有数据行），请检查。'); 
    return; 
  }

  const headers = rows[0];
  const dataRows = rows.slice(1);

  // 0. 提取“项目ID” 和 计算“任务id”唯一数
  const projectIdColIdx = headers.findIndex(h => normalize(h || '') === normalize('项目ID'));
  const taskIdColIdx = headers.findIndex(h => normalize(h || '') === normalize('任务id') || normalize(h || '') === normalize('任务ID'));
  const taskNameColIdx = headers.findIndex(h => normalize(h || '') === normalize('任务名称'));
  const skipColIdx = headers.findIndex(h => normalize(h || '') === normalize('是否跳过'));
  const filteredDataRows = filterSkippedTaskRows(dataRows, taskIdColIdx, skipColIdx);


  let projectIdVal = '未知项目ID';
  if (projectIdColIdx !== -1) {
    // 找第一个非空的项目ID
    const foundRow = dataRows.find(r => String(r[projectIdColIdx] || '').trim() !== '');
    if (foundRow) {
      projectIdVal = String(foundRow[projectIdColIdx]).trim();
    }
  }

  let uniqueTaskCount = 0;
  if (taskIdColIdx !== -1) {
    // 去重去空
    const taskIds = new Set();
    filteredDataRows.forEach(r => {
      const val = String(r[taskIdColIdx] || '').trim();
      if (val !== '') {
        taskIds.add(val);
      }
    });
    uniqueTaskCount = taskIds.size;
  }


  // 1. 查找目标列的索引
  const colMapping = {}; // targetKey -> columnIndex
  const missingCols = [];
  
  TARGET_COLUMNS.forEach(target => {
    const normTarget = normalize(target.key);
    const colIndex = headers.findIndex(h => {
      const normH = normalize(h || '');
      return normH.includes(normTarget) || normTarget.includes(normH);
    });
    
    if (colIndex !== -1) {
      colMapping[target.key] = colIndex;
    } else {
      missingCols.push(target.key);
    }
  });

  // 2. 统计每列的非空数量
  let totalNonEmptyCount = 0;
  
  const results = TARGET_COLUMNS.map(target => {
    const colIndex = colMapping[target.key];
    if (colIndex === undefined) return { ...target, count: 0, found: false };
    
    let nonEmptyCount = 0;
    filteredDataRows.forEach(row => {
      const val = String(row[colIndex] || '').trim();
      if (val !== '') nonEmptyCount++;
    });

    
    totalNonEmptyCount += nonEmptyCount;
    return { ...target, count: nonEmptyCount, found: true };
  });

  const { successTasks, failedTasks } = buildTaskTables(filteredDataRows, taskIdColIdx, taskNameColIdx, colMapping);

  renderResult({
    results,
    totalNonEmptyCount,
    missingCols,
    projectIdVal,
    uniqueTaskCount,
    successTasks,
    failedTasks
  });
}

function renderTaskTables(successTasks, failedTasks, projectIdVal) {
  const container = document.getElementById('task-tables-container');
  container.innerHTML = '';
  const safeProjectId = sanitizeFileName(projectIdVal);

  const tableConfigs = [
    {
      title: '任务成功表格',
      desc: '来自“task 完成情况:任务成功”为完全成功的任务，可直接预览与下载',
      countLabel: '成功任务数',
      rows: successTasks,
      emptyText: '当前没有完全成功的任务数据',
      fileName: `${safeProjectId}_任务成功表格.xlsx`,
      sheetName: '任务成功'
    },
    {
      title: '任务失败表格',
      desc: '来自除完全成功外的其余任务，可直接预览与下载',
      countLabel: '失败任务数',
      rows: failedTasks,
      emptyText: '当前没有失败任务数据',
      fileName: `${safeProjectId}_任务失败表格.xlsx`,
      sheetName: '任务失败'
    }
  ];

  tableConfigs.forEach(config => {
    const card = document.createElement('div');
    card.className = 'task-table-card';

    const head = document.createElement('div');
    head.className = 'task-table-head';

    const titleWrap = document.createElement('div');
    titleWrap.innerHTML = `
      <div class="task-table-title">${config.title}</div>
      <div class="task-table-desc">${config.desc}</div>
    `;
    head.appendChild(titleWrap);

    const actions = document.createElement('div');
    actions.className = 'task-table-actions';

    const count = document.createElement('div');
    count.className = 'task-table-count';
    count.textContent = `${config.countLabel}：${config.rows.length}`;
    actions.appendChild(count);

    if (config.rows.length > 0) {
      const downloadBtn = document.createElement('button');
      downloadBtn.className = 'btn btn-copy';
      downloadBtn.type = 'button';
      downloadBtn.innerHTML = `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
        下载表格文件
      `;
      downloadBtn.onclick = () => downloadTaskTableFile(config.rows, config.fileName, config.sheetName);
      actions.appendChild(downloadBtn);
    }

    head.appendChild(actions);
    card.appendChild(head);

    if (config.rows.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'task-empty';
      empty.textContent = config.emptyText;
      card.appendChild(empty);
      container.appendChild(card);
      return;
    }

    const wrap = document.createElement('div');
    wrap.className = 'task-table-wrap';

    const table = document.createElement('table');
    table.className = 'stats-table task-detail-table';
    table.innerHTML = `
      <thead>
        <tr>
          <th style="min-width:160px;">task完成情况</th>
          <th style="min-width:120px;">任务id</th>
          <th>任务名称</th>
        </tr>
      </thead>
      <tbody>
        ${config.rows.map(item => `
          <tr>
            <td>${item.completion}</td>
            <td>${item.taskId}</td>
            <td>${item.taskName}</td>
          </tr>
        `).join('')}
      </tbody>
    `;

    wrap.appendChild(table);
    card.appendChild(wrap);
    container.appendChild(card);
  });
}

function renderResult({ results, totalNonEmptyCount, missingCols, projectIdVal, uniqueTaskCount, successTasks, failedTasks }) {



  const now = new Date().toLocaleString('zh-CN', { hour12: false });
  document.getElementById('report-meta').textContent =
    `数据源：${projectIdVal}  |  统计时间：${now}`;

  // 汇总行：仅显示 队列数据量
  const summaryRow = document.getElementById('summary-row');
  summaryRow.innerHTML = `
    <div class="summary-card" style="max-width: 260px;">
      <div class="s-num">${uniqueTaskCount}</div>
      <div class="s-label">队列数据量</div>
    </div>
  `;

  // 明细表格
  const tbody = document.getElementById('stats-body');
  tbody.innerHTML = '';
  
  results.forEach(res => {
    // 分母依然是这5列的非空值总和 (totalNonEmptyCount)
    const pct = totalNonEmptyCount > 0 ? (res.count / totalNonEmptyCount * 100) : 0;
    const barColor = res.found ? res.barColor : '#cbd5e1';
    const displayCount = res.found ? res.count : '-';
    const displayPct = res.found ? `${pct.toFixed(2)}%` : '-';
    
    const row = document.createElement('tr');
    if (!res.found) row.style.opacity = '0.6';
    
    row.innerHTML = `
      <td><span class="tag ${res.tagClass}">${res.key}</span></td>
      <td style="text-align:center;font-weight:700;font-size:1.1rem">${displayCount}</td>
      <td>
        <div class="bar-wrap">
          <div class="bar-bg">
            <div class="bar-fill" style="width:${res.found ? pct : 0}%;background:${barColor}"></div>
          </div>
        </div>
      </td>
      <td class="bar-pct" style="text-align:right">${displayPct}</td>
    `;
    tbody.appendChild(row);
  });

  // --- 新增：异常占比汇总行 ---
  let anomalyCount = 0;
  let anomalyFound = false;
  results.forEach(res => {
    if (['task 完成情况:工程环境问题', 'task 完成情况:执行中连续黑屏超10屏', 'task 完成情况:task问题'].includes(res.key)) {
      anomalyCount += res.count;
      if (res.found) anomalyFound = true;
    }
  });

  const anomalyPct = totalNonEmptyCount > 0 ? (anomalyCount / totalNonEmptyCount * 100) : 0;
  const anomalyRow = document.createElement('tr');
  anomalyRow.style.backgroundColor = '#fff1f2'; // 浅红色高亮背景
  anomalyRow.innerHTML = `
    <td><span class="tag" style="background:#ffe4e6; color:#e11d48; border: 1px solid #fda4af;">异常占比 (汇总)</span></td>
    <td style="text-align:center;font-weight:700;font-size:1.1rem;color:#e11d48;">${anomalyFound ? anomalyCount : '-'}</td>
    <td>
      <div class="bar-wrap">
        <div class="bar-bg" style="background:#fecdd3;">
          <div class="bar-fill" style="width:${anomalyFound ? anomalyPct : 0}%;background:#e11d48"></div>
        </div>
      </div>
    </td>
    <td class="bar-pct" style="text-align:right;color:#e11d48;">${anomalyFound ? (anomalyPct.toFixed(2) + '%') : '-'}</td>
  `;
  tbody.appendChild(anomalyRow);

  // 缺失列提示
  const noticeEl = document.getElementById('missing-cols-notice');
  if (missingCols.length > 0) {
    document.getElementById('missing-cols-list').textContent = missingCols.join('，');
    noticeEl.style.display = 'block';
  } else {
    noticeEl.style.display = 'none';
  }

  renderTaskTables(successTasks, failedTasks, projectIdVal);


  document.getElementById('result-area').style.display = 'block';

  document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ---- 截图复制 ----
async function copyScreenshot() {
  const target = document.getElementById('snapshot-target');
  try {
    const canvas = await html2canvas(target, {
      scale: 2,
      backgroundColor: '#ffffff',
      useCORS: true,
      logging: false
    });
    canvas.toBlob(async blob => {
      try {
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob })
        ]);
        showToast('✅ 截图已复制到剪贴板，可直接粘贴');
      } catch (err) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '情况分析报告.png';
        a.click();
        URL.revokeObjectURL(url);
        showToast('📥 剪贴板写入受限，已自动下载截图');
      }
    }, 'image/png');
  } catch (err) {
    alert('截图失败：' + err.message);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ---- 重置 ----
function resetAll() {
  workbook = null;
  document.getElementById('file-name').textContent = '';
  document.getElementById('file-input').value = '';
  document.getElementById('stats-body').innerHTML = '';
  document.getElementById('task-tables-container').innerHTML = '';
  document.getElementById('result-area').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
