<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 完成情况统计工具</title>
  <!-- SheetJS: 解析 xlsx -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- html2canvas: 截图 -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --primary: #4f6ef7;
      --primary-light: #eef0ff;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --purple: #a855f7;
      --bg: #f5f7ff;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 20px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--primary);
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 32px;
    }

    /* ---- 拖拽区域 ---- */
    #drop-zone {
      border: 2.5px dashed var(--primary);
      border-radius: var(--radius);
      background: var(--primary-light);
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      max-width: 640px;
      margin: 0 auto 32px;
      position: relative;
    }
    #drop-zone.drag-over {
      background: #d6dbff;
      border-color: #2d44c8;
    }
    #drop-zone svg { margin-bottom: 12px; }
    #drop-zone p { color: var(--muted); font-size: 0.95rem; margin-top: 6px; }
    #drop-zone strong { color: var(--primary); }
    #file-input { display: none; }
    #file-name {
      margin-top: 14px;
      font-size: 0.88rem;
      color: var(--primary);
      font-weight: 600;
    }

    /* ---- 列选择 ---- */
    #col-selector {
      display: none;
      max-width: 640px;
      margin: 0 auto 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }
    #col-selector label {
      font-weight: 600;
      margin-bottom: 10px;
      display: block;
      color: var(--text);
    }
    #col-selector select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--bg);
      cursor: pointer;
    }
    #col-selector button {
      margin-top: 14px;
      width: 100%;
      padding: 11px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #col-selector button:hover { background: #3d5ce0; }

    /* ---- 结果区 ---- */
    #result-area { display: none; max-width: 780px; margin: 0 auto; }

    /* 操作按钮 */
    .action-bar {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { opacity: 0.85; }
    .btn-copy { background: var(--primary); color: #fff; }
    .btn-reset { background: #e2e8f0; color: var(--text); }

    /* 统计卡片容器（截图目标） */
    #snapshot-target {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 28px 28px 24px;
      box-shadow: 0 2px 12px rgba(79,110,247,0.07);
    }

    .report-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }
    .report-meta {
      font-size: 0.84rem;
      color: var(--muted);
      margin-bottom: 22px;
    }

    /* 汇总数字 */
    .summary-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .summary-card {
      flex: 1;
      min-width: 130px;
      background: var(--primary-light);
      border-radius: 10px;
      padding: 16px 20px;
      text-align: center;
    }
    .summary-card .s-num { font-size: 2rem; font-weight: 800; color: var(--primary); }
    .summary-card .s-label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    /* 数据表格 */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.93rem;
    }
    .stats-table th {
      background: #f1f5f9;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 2px solid var(--border);
    }
    .stats-table td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .stats-table tr:last-child td { border-bottom: none; }
    .stats-table tr:hover td { background: #f8faff; }

    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .tag-success  { background: #dcfce7; color: #15803d; }
    .tag-model    { background: #fef3c7; color: #92400e; }
    .tag-env      { background: #fee2e2; color: #b91c1c; }
    .tag-screen   { background: #ede9fe; color: #6d28d9; }
    .tag-task     { background: #dbeafe; color: #1d4ed8; }
    .tag-other    { background: #f1f5f9; color: #475569; }

    /* 进度条 */
    .bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .bar-bg {
      flex: 1;
      height: 8px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s ease;
    }
    .bar-pct {
      font-weight: 700;
      font-size: 0.88rem;
      min-width: 48px;
      text-align: right;
      color: var(--text);
    }

    /* 未匹配提示 */
    #unmatched-section {
      margin-top: 20px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.88rem;
    }
    #unmatched-section summary {
      cursor: pointer;
      font-weight: 600;
      color: #92400e;
    }
    #unmatched-list {
      margin-top: 10px;
      max-height: 150px;
      overflow-y: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .um-chip {
      background: #fef3c7;
      color: #78350f;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.82rem;
    }

    /* 复制成功提示 */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1e293b;
      color: #fff;
      padding: 12px 28px;
      border-radius: 99px;
      font-size: 0.92rem;
      font-weight: 600;
      transition: transform 0.3s, opacity 0.3s;
      opacity: 0;
      z-index: 999;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

<!-- 返回主页导航 -->
<div style="max-width: 640px; margin: 0 auto -10px auto; padding-top: 10px;">
  <a href="index.html" style="display: inline-flex; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; font-size: 0.95rem; font-weight: 500; padding: 6px 12px; border-radius: 8px; background: #f8fafc; border: 1px solid var(--border); transition: all 0.2s;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    返回工具箱主页
  </a>
</div>

<h1>📊 Task 完成情况统计工具</h1>
<p class="subtitle">拖拽 / 点击上传 .xlsx 文件，自动统计各任务完成状态的出现次数与占比</p>

<!-- 拖拽区 -->
<div id="drop-zone" onclick="document.getElementById('file-input').click()">
  <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
    <rect width="48" height="48" rx="12" fill="#e0e7ff"/>
    <path d="M24 14v14M17 21l7-7 7 7" stroke="#4f6ef7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M14 34h20" stroke="#4f6ef7" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <p><strong>点击选择</strong>或将 .xlsx 文件拖入此区域</p>
  <p>支持多 Sheet，会自动列出所有列供您选择</p>
  <div id="file-name"></div>
  <input type="file" id="file-input" accept=".xlsx,.xls,.csv" />
</div>

<!-- 列选择 -->
<div id="col-selector">
  <label for="sheet-select">选择 Sheet：</label>
  <select id="sheet-select" onchange="onSheetChange()"></select>
  <label for="col-select" style="margin-top:14px;">选择包含"task 完成情况"的列：</label>
  <select id="col-select"></select>
  <button onclick="runStats()">开始统计</button>
</div>

<!-- 结果区 -->
<div id="result-area">
  <div class="action-bar">
    <button class="btn btn-reset" onclick="resetAll()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>
      重新上传
    </button>
    <button class="btn btn-copy" onclick="copyScreenshot()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      复制统计截图
    </button>
  </div>

  <div id="snapshot-target">
    <div class="report-title" id="report-title">Task 完成情况统计报告</div>
    <div class="report-meta" id="report-meta"></div>

    <div class="summary-row" id="summary-row"></div>

    <table class="stats-table">
      <thead>
        <tr>
          <th>任务完成情况</th>
          <th style="text-align:center">出现次数</th>
          <th style="min-width:180px">占比（进度条）</th>
          <th style="text-align:right">占比（%）</th>
        </tr>
      </thead>
      <tbody id="stats-body"></tbody>
    </table>

    <details id="unmatched-section" style="display:none">
      <summary>⚠️ 未匹配到预定义类别的值（点击展开）</summary>
      <div id="unmatched-list"></div>
    </details>
  </div>
</div>

<div id="toast">✅ 截图已复制到剪贴板</div>

<script>
// ---- 预定义类别配置 ----
const CATEGORIES = [
  { key: '任务成功',           label: 'task 完成情况：任务成功',           tagClass: 'tag-success', barColor: '#22c55e' },
  { key: '模型问题',           label: 'task 完成情况：模型问题',           tagClass: 'tag-model',   barColor: '#f59e0b' },
  { key: '工程环境问题',       label: 'task 完成情况：工程环境问题',       tagClass: 'tag-env',     barColor: '#ef4444' },
  { key: '执行中连续黑屏超10屏', label: 'task 完成情况：执行中连续黑屏超10屏', tagClass: 'tag-screen',  barColor: '#a855f7' },
  { key: 'task问题',           label: 'task 完成情况：task问题',           tagClass: 'tag-task',    barColor: '#3b82f6' },
];

// 模糊匹配：去除空格/标点差异后匹配
function normalize(s) {
  return String(s || '').replace(/[\s\u3000:：\-]/g, '').toLowerCase();
}

const CAT_NORMALIZED = CATEGORIES.map(c => ({ ...c, norm: normalize(c.key) }));

function matchCategory(val) {
  const n = normalize(val);
  return CAT_NORMALIZED.find(c => n.includes(c.norm) || c.norm.includes(n)) || null;
}

// ---- 全局状态 ----
let workbook = null;
let allData = {};  // sheetName -> [{col: val}]

// ---- 拖拽 & 文件读取 ----
const dropZone = document.getElementById('drop-zone');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

function loadFile(file) {
  document.getElementById('file-name').textContent = '📎 ' + file.name;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      workbook = XLSX.read(e.target.result, { type: 'array' });
      populateSheetSelect();
      document.getElementById('col-selector').style.display = 'block';
      document.getElementById('result-area').style.display = 'none';
    } catch(err) {
      alert('文件解析失败，请确认是有效的 .xlsx 文件。\n' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function populateSheetSelect() {
  const sel = document.getElementById('sheet-select');
  sel.innerHTML = '';
  workbook.SheetNames.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
  onSheetChange();
}

function onSheetChange() {
  const sheetName = document.getElementById('sheet-select').value;
  const sheet = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
  if (!rows.length) return;

  const headers = rows[0];
  const colSel = document.getElementById('col-select');
  colSel.innerHTML = '';

  headers.forEach((h, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `[${i + 1}] ${h || '(空列名)'}`;
    // 自动预选含"task"关键词的列
    if (normalize(String(h)).includes('task') || normalize(String(h)).includes('完成')) {
      opt.selected = true;
    }
    colSel.appendChild(opt);
  });
}

// ---- 核心统计 ----
function runStats() {
  const sheetName = document.getElementById('sheet-select').value;
  const colIndex  = parseInt(document.getElementById('col-select').value);
  const sheet = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

  if (rows.length < 2) { alert('该 Sheet 数据不足，请重新选择。'); return; }

  // 从第 2 行开始读数据（跳过表头）
  const values = rows.slice(1).map(r => String(r[colIndex] || '').trim()).filter(v => v !== '');

  // 统计
  const counts = {};
  CATEGORIES.forEach(c => counts[c.key] = 0);
  const unmatched = {};

  values.forEach(v => {
    const cat = matchCategory(v);
    if (cat) {
      counts[cat.key]++;
    } else {
      unmatched[v] = (unmatched[v] || 0) + 1;
    }
  });

  const total = Object.values(counts).reduce((a, b) => a + b, 0);
  const totalAll = values.length;

  renderResult({ counts, total, totalAll, unmatched, sheetName,
                 colName: rows[0][colIndex] || `第${colIndex+1}列` });
}

function renderResult({ counts, total, totalAll, unmatched, sheetName, colName }) {
  // 元信息
  const now = new Date().toLocaleString('zh-CN', { hour12: false });
  document.getElementById('report-meta').textContent =
    `Sheet：${sheetName}  |  列：${colName}  |  统计时间：${now}`;

  // 汇总行
  const summaryRow = document.getElementById('summary-row');
  const successRate = total > 0 ? ((counts['任务成功'] / total) * 100).toFixed(1) : 0;
  summaryRow.innerHTML = `
    <div class="summary-card">
      <div class="s-num">${totalAll}</div>
      <div class="s-label">数据总行数</div>
    </div>
    <div class="summary-card">
      <div class="s-num">${total}</div>
      <div class="s-label">已匹配总数（分母）</div>
    </div>
    <div class="summary-card">
      <div class="s-num" style="color:#22c55e">${counts['任务成功']}</div>
      <div class="s-label">任务成功</div>
    </div>
    <div class="summary-card">
      <div class="s-num" style="color:#22c55e">${successRate}%</div>
      <div class="s-label">成功率</div>
    </div>
  `;

  // 明细表
  const tbody = document.getElementById('stats-body');
  tbody.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const cnt = counts[cat.key];
    const pct = total > 0 ? (cnt / total * 100) : 0;
    const row = document.createElement('tr');
    row.innerHTML = `
      <td><span class="tag ${cat.tagClass}">${cat.key}</span></td>
      <td style="text-align:center;font-weight:700;font-size:1.1rem">${cnt}</td>
      <td>
        <div class="bar-wrap">
          <div class="bar-bg">
            <div class="bar-fill" style="width:${pct}%;background:${cat.barColor}"></div>
          </div>
        </div>
      </td>
      <td class="bar-pct" style="text-align:right">${pct.toFixed(2)}%</td>
    `;
    tbody.appendChild(row);
  });

  // 未匹配
  const umSection = document.getElementById('unmatched-section');
  const umList = document.getElementById('unmatched-list');
  const unmatchedEntries = Object.entries(unmatched);
  if (unmatchedEntries.length > 0) {
    umSection.style.display = 'block';
    umList.innerHTML = unmatchedEntries.map(([v, c]) =>
      `<span class="um-chip">${v} (${c}次)</span>`).join('');
  } else {
    umSection.style.display = 'none';
  }

  document.getElementById('result-area').style.display = 'block';
  document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ---- 截图复制 ----
async function copyScreenshot() {
  const target = document.getElementById('snapshot-target');
  try {
    const canvas = await html2canvas(target, {
      scale: 2,
      backgroundColor: '#ffffff',
      useCORS: true,
      logging: false
    });
    canvas.toBlob(async blob => {
      try {
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob })
        ]);
        showToast('✅ 截图已复制到剪贴板，可直接粘贴');
      } catch (err) {
        // 回退：触发下载
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'task统计报告.png';
        a.click();
        URL.revokeObjectURL(url);
        showToast('📥 剪贴板写入受限，已自动下载截图');
      }
    }, 'image/png');
  } catch (err) {
    alert('截图失败：' + err.message);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ---- 重置 ----
function resetAll() {
  workbook = null;
  document.getElementById('file-name').textContent = '';
  document.getElementById('file-input').value = '';
  document.getElementById('col-selector').style.display = 'none';
  document.getElementById('result-area').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
